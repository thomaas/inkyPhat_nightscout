# This workflow installs Python dependencies, lints with flake8, and runs pytest.
# See https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build on Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,tandemcalls,tandem_probe_output
        # exit-zero treats all errors as warnings — the GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=.venv,tandemcalls,tandem_probe_output

    - name: Run tests
      env:
        # Don't hit the live Dexcom API in CI; config.py in the repo may contain
        # placeholder or real credentials we don't want the runner to use.
        SKIP_INTEGRATION_TESTS: "1"
      run: pytest -v
